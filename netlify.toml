# Production build: `npm run build` emits a minified, hashed bundle to dist/.
# (Source stays file://-friendly; dist/ is generated.)
[build]
  command = "npm run build"
  publish = "dist"

# Hashed JS bundle + images: filenames change on edit, so cache forever.
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# HTML: always revalidate (CSS is inlined here, so no /css/* rule needed).
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Frame-Options = "SAMEORIGIN"
